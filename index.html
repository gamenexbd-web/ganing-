<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monetag Auto Mathod</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- ✅ Dual Zone SDK -->
<script src='//libtl.com/sdk.js' data-zone='10777612' data-sdk='show_10777612'></script>
<script src='//libtl.com/sdk.js' data-zone='10784707' data-sdk='show_10784707'></script>

<style>
body {
  margin:0;height:100vh;font-family:'Segoe UI',sans-serif;
  background:radial-gradient(circle at top,#1a2a6c,#000);
  display:flex;justify-content:center;align-items:center;color:#fff;
}
.card {
  width:350px;padding:25px;border-radius:20px;
  background:rgba(0,0,0,0.6);text-align:center;
}
button {
  padding:12px 15px;border:none;border-radius:10px;
  background:#00e5ff;color:#000;font-weight:bold;cursor:pointer;
}
.timer {margin-top:10px;font-size:18px;color:#4caf50;}
</style>
</head>

<body>

<div class="card">
  <h2>🚀 Auto Ads System</h2>
  <button onclick="enableAuto()">Auto Start</button>

  <div class="timer">
    Next Ads in <span id="countdown">20</span>s
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();

let timerInterval;
let timeLeft = 20;

// ✅ FIX: localStorage থেকে zone load
let currentZone = localStorage.getItem("zone") 
  ? parseInt(localStorage.getItem("zone")) 
  : 1;

// ✅ SMART SHOW (Dual Zone)
function showAdSmart() {

  if (currentZone === 1 && typeof show_10777612 === "function") {
    show_10777612().catch(()=>{});
  } 
  else if (currentZone === 2 && typeof show_10784707 === "function") {
    show_10784707().catch(()=>{});
  }

  // 🔁 rotate zone
  currentZone = (currentZone === 1) ? 2 : 1;

  // ✅ SAVE zone
  localStorage.setItem("zone", currentZone);
}

// ✅ AUTO TIMER + RELOAD
function startAutoTimer() {
  clearInterval(timerInterval);

  timeLeft = 20;
  countdown.textContent = timeLeft;

  timerInterval = setInterval(() => {
    timeLeft--;
    countdown.textContent = timeLeft;

    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      location.reload(); // reload system same
    }
  }, 1000);
}

// ✅ AUTO START
function enableAuto() {
  localStorage.setItem("adMode", "auto");

  showAdSmart(); // first ad
  startAutoTimer();
}

// ✅ RELOAD AUTO CONTINUE
window.addEventListener("load", () => {
  if (localStorage.getItem("adMode") === "auto") {
    showAdSmart();   // next zone
    startAutoTimer();
  }
});
</script>

</body>
</html>
